<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alertas — Puertas Blindadas</title>
  <link rel="stylesheet" href="../assets/css/global.css"/>
</head>
<body>
<div class="layout">
  <div id="sidebar-container"></div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="main-content">
    <div id="topbar-container"></div>
    <main class="page-body">

      <div class="page-header">
        <div>
          <div class="page-title">Centro de Alertas</div>
          <div class="page-subtitle">Alertas ordenadas por prioridad: urgente → alta → media (FR-35, FR-37)</div>
        </div>
      </div>

      <div id="alert-container"></div>

      <!-- KPIs de alertas -->
      <div class="kpi-grid" style="margin-bottom:24px">
        <div class="kpi-card kpi-danger">
          <div class="kpi-label">Urgentes</div>
          <div class="kpi-value danger" id="kpi-urgente">1</div>
          <div class="kpi-sub">Stock ≤ crítico</div>
        </div>
        <div class="kpi-card kpi-warning">
          <div class="kpi-label">Altas</div>
          <div class="kpi-value warning" id="kpi-alta">1</div>
          <div class="kpi-sub">Producto crítico con stock bajo</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Medias</div>
          <div class="kpi-value" id="kpi-media">1</div>
          <div class="kpi-sub">Stock bajo sin criticidad</div>
        </div>
        <div class="kpi-card kpi-success">
          <div class="kpi-label">Resueltas</div>
          <div class="kpi-value" id="kpi-resuelta" style="color:var(--success)">0</div>
          <div class="kpi-sub">Cerradas en este periodo</div>
        </div>
      </div>

      <!-- Filtro -->
      <div class="filter-row" style="margin-bottom:16px">
        <select class="form-control" id="filter-prioridad" style="width:auto">
          <option value="">Todas las prioridades</option>
          <option value="urgente">Urgente</option>
          <option value="alta">Alta</option>
          <option value="media">Media</option>
        </select>
        <select class="form-control" id="filter-estado" style="width:auto">
          <option value="activa">Solo activas</option>
          <option value="">Todas (incl. resueltas)</option>
        </select>
      </div>

      <!-- Lista de alertas -->
      <div id="alertas-list" style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px"></div>

      <!-- Historial completo (FR-37) -->
      <div class="card">
        <div class="card-title">Historial de alertas</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>ID</th><th>Producto</th><th>Tipo</th><th>Prioridad</th><th>Stock actual</th><th>Generada</th><th>Estado</th></tr>
            </thead>
            <tbody id="tbody-historial"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="../assets/js/layout.js"></script>
<script src="../shared/api.js"></script>
<script>
let alertas = [];

function getPrioridadCls(p) {
  return p === 'urgente' ? 'badge-danger' : p === 'alta' ? 'badge-warning' : 'badge-gray';
}

async function cargarAlertas() {
  const fp = document.getElementById('filter-prioridad').value;
  const fe = document.getElementById('filter-estado').value;
  try {
    alertas = await API.alertas.listar({ prioridad: fp || null, estado: fe || null });
    renderAlertas();
  } catch (err) {
    showAlert('alert-container', 'danger', 'Error cargando alertas: ' + err.message);
  }
}

function renderAlertas() {
  const list = document.getElementById('alertas-list');
  const activas = alertas.filter(a => a.estado === 'activa');

  if (activas.length === 0) {
    list.innerHTML = `<div class="card"><div class="empty-state"><div class="empty-state-icon">✅</div><p style="font-size:16px;font-weight:600;color:var(--success)">Inventario bajo control</p><p style="margin-top:8px">No hay alertas activas.</p></div></div>`;
  } else {
    const borderColors = { urgente:'var(--danger)', alta:'var(--warning)', media:'var(--gray-mid)' };
    list.innerHTML = activas.map(a => `
      <div class="card card-sm" style="border-left:4px solid ${borderColors[a.prioridad] || 'var(--gray-mid)'}">
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div style="flex:1;min-width:200px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span class="badge ${getPrioridadCls(a.prioridad)}">${(a.prioridad||'media').toUpperCase()}</span>
              <span style="font-size:13px;font-weight:600">${a.producto}</span>
            </div>
            <div style="font-size:12px;color:var(--gray)">
              <span class="td-mono">${a.sku}</span> · ${a.tipo}
              · Stock actual: <strong style="color:${a.prioridad==='urgente'?'var(--danger)':'#000'}">${parseFloat(a.stock_actual||0)}</strong>
              (mín. ${parseFloat(a.stock_minimo||0)})
              · ${a.fecha_generacion ? a.fecha_generacion.split('T')[0] : '—'}
              ${a.tiempo_reposicion ? `· Tiempo reposición: <strong>${a.tiempo_reposicion} días</strong>` : ''}
              ${a.proveedor ? `· Proveedor: ${a.proveedor}` : ''}
            </div>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="resolverAlerta(${a.id})">Marcar resuelta</button>
        </div>
      </div>`).join('');
  }

  // KPIs
  document.getElementById('kpi-urgente').textContent  = alertas.filter(a=>a.prioridad==='urgente'&&a.estado==='activa').length;
  document.getElementById('kpi-alta').textContent     = alertas.filter(a=>a.prioridad==='alta'   &&a.estado==='activa').length;
  document.getElementById('kpi-media').textContent    = alertas.filter(a=>a.prioridad==='media'  &&a.estado==='activa').length;
  document.getElementById('kpi-resuelta').textContent = alertas.filter(a=>a.estado==='resuelta').length;

  // Historial (FR-37)
  document.getElementById('tbody-historial').innerHTML = alertas.length === 0
    ? `<tr><td colspan="7"><div class="empty-state"><p>Sin historial de alertas.</p></div></td></tr>`
    : alertas.map(a => `
    <tr>
      <td><span class="td-mono" style="font-size:11px">${a.id}</span></td>
      <td style="font-size:13px"><div style="font-weight:500">${a.producto}</div><div style="font-size:11px;color:#aaa">${a.sku}</div></td>
      <td style="font-size:13px">${a.tipo}</td>
      <td><span class="badge ${getPrioridadCls(a.prioridad)}">${a.prioridad||'media'}</span></td>
      <td style="font-weight:600">${parseFloat(a.stock_actual||0)}</td>
      <td style="font-size:12px;color:var(--gray)">${a.fecha_generacion ? a.fecha_generacion.split('T')[0] : '—'}</td>
      <td><span class="badge ${a.estado==='activa'?'badge-warning':'badge-success'}">${a.estado}</span></td>
    </tr>`).join('');
}

async function resolverAlerta(id) {
  try {
    await API.alertas.resolver(id);
    showAlert('alert-container','success','Alerta marcada como resuelta.');
    cargarAlertas();
  } catch (err) {
    showAlert('alert-container','danger','Error: ' + err.message);
  }
}

document.getElementById('filter-prioridad').addEventListener('change', cargarAlertas);
document.getElementById('filter-estado').addEventListener('change', cargarAlertas);

// Generar alertas al cargar y luego mostrarlas
API.alertas.generar().catch(() => {}).finally(() => cargarAlertas());
</script>
</body>
</html>
