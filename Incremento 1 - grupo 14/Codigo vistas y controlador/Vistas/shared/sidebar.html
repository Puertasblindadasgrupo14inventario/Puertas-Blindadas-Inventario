<div class="modal-backdrop" id="modal-cambiar-pass" style="display:none">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <div class="modal-title">Cambiar contraseña</div>
      <button class="modal-close" id="close-modal-pass">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

      <div class="form-group">
        <label class="form-label">Contraseña actual</label>
        <input class="form-control" type="password" id="pass-actual" placeholder="••••••••"/>

        <input class="form-control" type="password" id="pass-confirmar" placeholder="Repite la contraseña"/>

    </div>
