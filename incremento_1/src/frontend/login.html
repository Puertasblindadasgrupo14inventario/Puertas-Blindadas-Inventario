<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Puertas Blindadas</title>
  <link rel="stylesheet" href="assets/css/global.css" />
  <style>
    body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    .login-logo {
      width: 52px; height: 52px;
      background: var(--orange);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: var(--white);
      margin-bottom: 22px;
      letter-spacing: -0.5px;
    }

    .login-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .login-sub   { font-size: 13px; color: var(--gray); margin-bottom: 28px; }

    .forgot-link {
      font-size: 13px;
      color: var(--orange);
      font-weight: 500;
      cursor: pointer;
      float: right;
      margin-top: -8px;
      margin-bottom: 20px;
      display: block;
    }
    .forgot-link:hover { color: var(--orange-dark); }

    .login-submit {
      width: 100%;
      justify-content: center;
      padding: 12px;
      font-size: 14px;
      margin-top: 8px;
    }

    .login-demo {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-top: 20px;
      line-height: 1.7;
    }
    .login-demo b { color: #777; }

    #alert-container .alert { margin-bottom: 0; }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">PB</div>
      <div class="login-title">Iniciar sesión</div>
      <div class="login-sub">Puertas Blindadas · Sistema de Inventario</div>

      <div id="alert-container"></div>

      <form id="login-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="input-user">
            Usuario o email <span class="required">*</span>
          </label>
          <input
            class="form-control"
            id="input-user"
            type="text"
            placeholder="ej: jgarcia"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="input-pass">
            Contraseña <span class="required">*</span>
          </label>
          <input
            class="form-control"
            id="input-pass"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <a class="forgot-link" id="forgot-link">¿Olvidaste tu contraseña?</a>

        <button class="btn btn-primary login-submit" type="submit" id="btn-submit">
          Ingresar
        </button>

      </form>

      <p class="login-demo">
        Usa tu usuario y contraseña de PostgreSQL
      </p>

    </div>
  </div>

  <!-- Modal recuperar contraseña (FR-56) -->
  <div class="modal-backdrop" id="modal-forgot">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title">Recuperar contraseña</div>
          <div class="modal-subtitle">Te enviaremos un enlace a tu correo registrado</div>
        </div>
        <button class="modal-close" onclick="closeModal('modal-forgot')">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div id="forgot-alert"></div>
        <div class="form-group">
          <label class="form-label" for="forgot-email">
            Email registrado <span class="required">*</span>
          </label>
          <input class="form-control" id="forgot-email" type="email" placeholder="usuario@puertasblindadas.cl" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-forgot')">Cancelar</button>
        <button class="btn btn-primary" id="btn-forgot-send">Enviar enlace</button>
      </div>
    </div>
  </div>

  <script>
    const form      = document.getElementById('login-form');
    const btnSubmit = document.getElementById('btn-submit');

    function showError(msg) {
      document.getElementById('alert-container').innerHTML =
        `<div class="alert alert-danger" style="margin-bottom:16px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          ${msg}
        </div>`;
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      document.getElementById('alert-container').innerHTML = '';

      const userVal = document.getElementById('input-user').value.trim();
      const passVal = document.getElementById('input-pass').value;

      if (!userVal || !passVal) { showError('Ingresa tu usuario y contraseña.'); return; }

      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Verificando...';

      try {
        const res = await fetch('http://localhost:3000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: userVal, password: passVal }),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Usuario o contraseña incorrectos.');
          btnSubmit.disabled = false;
          btnSubmit.textContent = 'Ingresar';
          return;
        }

        /* Login exitoso: guardar sesión con token y redirigir */
        sessionStorage.setItem('pb_user', JSON.stringify({
          ...data.user,
          token: data.token,
        }));
        window.location.href = 'dashboard.html';

      } catch (err) {
        showError('No se pudo conectar al servidor. Verifica que el backend esté corriendo.');
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Ingresar';
      }
    });

    /* Limpiar error al escribir */
    ['input-user','input-pass'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById('alert-container').innerHTML = '';
      });
    });

    /* Modal recuperar contraseña */
    document.getElementById('forgot-link').addEventListener('click', () => openModal('modal-forgot'));

    document.getElementById('btn-forgot-send').addEventListener('click', () => {
      const email = document.getElementById('forgot-email').value.trim();
      if (!email || !email.includes('@')) {
        document.getElementById('forgot-alert').innerHTML =
          `<div class="alert alert-danger">Ingresa un email válido.</div>`;
        return;
      }
      document.getElementById('forgot-alert').innerHTML =
        `<div class="alert alert-success">Se ha enviado el enlace de recuperación a <b>${email}</b>.</div>`;
      setTimeout(() => closeModal('modal-forgot'), 2000);
    });

    function openModal(id)  { document.getElementById(id)?.classList.add('show'); }
    function closeModal(id) { document.getElementById(id)?.classList.remove('show'); }
    document.addEventListener('click', e => {
      if (e.target.classList.contains('modal-backdrop')) e.target.classList.remove('show');
    });
  </script>
</body>
</html>
