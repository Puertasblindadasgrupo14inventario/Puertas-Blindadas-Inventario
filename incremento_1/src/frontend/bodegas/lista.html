<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bodegas — Puertas Blindadas</title>
  <link rel="stylesheet" href="../assets/css/global.css" />
</head>
<body>
<div class="layout">
  <div id="sidebar-container"></div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="main-content">
    <div id="topbar-container"></div>
    <main class="page-body">

      <div class="page-header">
        <div>
          <div class="page-title">Bodegas</div>
          <div class="page-subtitle">Gestión de almacenes físicos y stock por ubicación</div>
        </div>
        <button class="btn btn-primary" onclick="openModal('modal-nueva')" data-rol="gerencia">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nueva bodega
        </button>
      </div>

      <div id="alert-container"></div>

      <!-- Grid de cards -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:24px" id="bodegas-grid"></div>

      <!-- Detalle de bodega (FR-16) -->
      <div id="detalle-bodega" style="display:none">
        <button class="btn btn-ghost" style="margin-bottom:16px" onclick="volverLista()">← Volver a bodegas</button>
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
            <div>
              <div style="font-weight:700;font-size:16px" id="det-nombre"></div>
              <div style="font-size:12px;color:var(--gray)" id="det-meta"></div>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
              <span class="badge badge-orange" id="det-productos"></span>
              <button class="btn btn-secondary btn-sm" onclick="abrirAsignar(bodegaActual)" data-rol="gerencia">+ Asignar producto</button>
            </div>
          </div>
          <div class="section-label">Productos en esta bodega</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>SKU</th><th>Nombre</th><th>Unidad</th><th>Stock físico</th><th>Reservado para OT</th></tr>
              </thead>
              <tbody id="tbody-bodega"></tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Modal nueva bodega (FR-13) -->
<div class="modal-backdrop" id="modal-nueva">
  <div class="modal">
    <div class="modal-header">
      <div><div class="modal-title">Nueva Bodega</div><div class="modal-subtitle">Registrar almacén físico</div></div>
      <button class="modal-close" onclick="closeModal('modal-nueva')">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div id="modal-nueva-alert"></div>
      <div class="form-group">
        <label class="form-label" for="n-codigo">Código único <span class="required">*</span></label>
        <input class="form-control" id="n-codigo" placeholder="BOD-004" />
        <div class="form-hint">Alfanumérico, irrepetible. Ej: BOD-001, CDS-01</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="n-nombre">Nombre <span class="required">*</span></label>
        <input class="form-control" id="n-nombre" placeholder="Bodega Central" />
      </div>
      <div class="form-group">
        <label class="form-label" for="n-ubicacion">Ubicación física</label>
        <input class="form-control" id="n-ubicacion" placeholder="Planta principal, Sede Norte..." />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-nueva')">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-bodega">Registrar bodega</button>
    </div>
  </div>
</div>

<!-- Modal asignar producto (FR-14) -->
<div class="modal-backdrop" id="modal-asignar">
  <div class="modal">
    <div class="modal-header">
      <div><div class="modal-title">Asignar producto</div><div class="modal-subtitle" id="asignar-subtitle"></div></div>
      <button class="modal-close" onclick="closeModal('modal-asignar')">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div id="modal-asignar-alert"></div>
      <div class="form-group">
        <label class="form-label">Producto <span class="required">*</span></label>
        <select class="form-control" id="asignar-producto">
          <option value="">Seleccionar por SKU...</option>
          <option value="MAT-ACE-001">MAT-ACE-001 — Acero inoxidable placa 2mm</option>
          <option value="MAT-MAD-002">MAT-MAD-002 — Madera roble 2x7 metros</option>
          <option value="INS-CER-003">INS-CER-003 — Cerradura seguridad triple</option>
          <option value="HER-TAL-004">HER-TAL-004 — Taladro percutor 800W</option>
          <option value="INS-TOR-005">INS-TOR-005 — Tornillo acero inox 5cm</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="asignar-ubicacion">Ubicación interna</label>
        <input class="form-control" id="asignar-ubicacion" placeholder="Anaquel A1, Rack B2..." />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-asignar')">Cancelar</button>
      <button class="btn btn-primary" id="btn-confirmar-asignar">Asignar</button>
    </div>
  </div>
</div>

<script src="../assets/js/layout.js"></script>
<script src="../shared/api.js"></script>
<script>
let bodegas = [];
let bodegaActual = null;

async function cargarBodegas() {
  try {
    bodegas = await API.bodegas.listar();
    renderCards();
  } catch (err) {
    showAlert('alert-container', 'danger', 'Error cargando bodegas: ' + err.message);
  }
}

function renderCards() {
  const grid = document.getElementById('bodegas-grid');
  if (!bodegas || bodegas.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏭</div><p>No hay bodegas registradas.</p></div>';
    return;
  }
  grid.innerHTML = bodegas.map(b => `
    <div class="card" style="cursor:pointer;transition:border-color .15s"
      onmouseenter="this.style.borderColor='#fe8f01'" onmouseleave="this.style.borderColor='#e0e0e0'"
      onclick="verDetalle(${b.id})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div style="width:44px;height:44px;background:var(--orange-light);border-radius:10px;display:flex;align-items:center;justify-content:center">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fe8f01" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
        <span class="badge ${b.estado === 'activo' ? 'badge-success' : 'badge-gray'}">${b.estado}</span>
      </div>
      <div style="font-weight:700;font-size:15px;margin-bottom:4px">${b.nombre}</div>
      <div style="font-size:12px;color:var(--gray);margin-bottom:14px">${b.direccion || 'Sin dirección'}</div>
      <div style="display:flex;justify-content:space-between;padding-top:12px;border-top:1px solid #f0f0f0">
        <span style="font-size:12px;color:var(--gray)">SKUs: <b style="color:#000">${b.total_skus || 0}</b></span>
        <span style="font-size:12px;color:var(--orange);font-weight:500">Ver detalle →</span>
      </div>
    </div>`).join('');
}

async function verDetalle(id) {
  bodegaActual = id;
  try {
    const data = await API.bodegas.obtener(id);
    document.getElementById('bodegas-grid').style.display   = 'none';
    document.getElementById('detalle-bodega').style.display = 'block';
    document.getElementById('det-nombre').textContent    = data.nombre;
    document.getElementById('det-meta').textContent      = `ID: ${data.id} · ${data.direccion || 'Sin dirección'}`;
    document.getElementById('det-productos').textContent = `${data.materiales?.length || 0} materiales`;

    const tbody = document.getElementById('tbody-bodega');
    tbody.innerHTML = !data.materiales || data.materiales.length === 0
      ? `<tr><td colspan="5"><div class="empty-state"><p>Sin existencias registradas en esta bodega.</p></div></td></tr>`
      : data.materiales.map(i => {
          const color = parseFloat(i.cantidad_fisica||0) <= parseFloat(i.stock_critico||0) ? 'var(--danger)'
                      : parseFloat(i.cantidad_fisica||0) <= parseFloat(i.stock_minimo||0)  ? 'var(--warning)'
                      : 'inherit';
          return `<tr>
            <td><span class="td-mono">${i.sku}</span></td>
            <td style="font-weight:500;font-size:13px">${i.nombre}</td>
            <td style="color:var(--gray);font-size:13px">${i.unidad_medida || '—'}</td>
            <td style="font-weight:600;color:${color}">${parseFloat(i.cantidad_fisica||0)}</td>
            <td style="color:var(--gray);font-size:13px">${parseFloat(i.cantidad_reservada||0)}</td>
          </tr>`;
        }).join('');
  } catch (err) {
    showAlert('alert-container', 'danger', 'Error cargando detalle: ' + err.message);
  }
}

function volverLista() {
  document.getElementById('bodegas-grid').style.display   = 'grid';
  document.getElementById('detalle-bodega').style.display = 'none';
  bodegaActual = null;
}

function abrirAsignar(id) {
  const b = bodegas.find(x => x.id === id);
  document.getElementById('asignar-subtitle').textContent = b?.nombre || `Bodega ${id}`;
  openModal('modal-asignar');
}

document.getElementById('btn-guardar-bodega').addEventListener('click', async () => {
  const codigo    = document.getElementById('n-codigo').value.trim();
  const nombre    = document.getElementById('n-nombre').value.trim();
  const ubicacion = document.getElementById('n-ubicacion').value.trim();

  // Validar campos obligatorios
  const alertEl = document.getElementById('modal-nueva-alert');
  if (!codigo) {
    document.getElementById('n-codigo').style.borderColor = 'var(--danger)';
    alertEl.innerHTML = '<div class="alert alert-danger">El código de la bodega es obligatorio.</div>';
    return;
  }
  if (!nombre) {
    document.getElementById('n-nombre').style.borderColor = 'var(--danger)';
    alertEl.innerHTML = '<div class="alert alert-danger">El nombre es obligatorio.</div>';
    return;
  }

  // Limpiar bordes
  document.getElementById('n-codigo').style.borderColor = '';
  document.getElementById('n-nombre').style.borderColor = '';

  try {
    await API.bodegas.crear({ codigo, nombre, direccion: ubicacion || null });
    closeModal('modal-nueva');
    ['n-codigo','n-nombre','n-ubicacion'].forEach(id => {
      document.getElementById(id).value = '';
      document.getElementById(id).style.borderColor = '';
    });
    alertEl.innerHTML = '';
    cargarBodegas();
    showAlert('alert-container','success',`Bodega <strong>${nombre}</strong> registrada correctamente.`);
  } catch (err) {
    alertEl.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
  }
});

document.getElementById('btn-confirmar-asignar').addEventListener('click', () => {
  closeModal('modal-asignar');
  showAlert('alert-container','info','Para asignar stock a una bodega, registra una entrada de movimiento desde la vista de Movimientos.');
});

cargarBodegas();
</script>
</body>
</html>
