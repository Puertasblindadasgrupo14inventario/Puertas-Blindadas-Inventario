<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalle Proveedor — Puertas Blindadas</title>
  <link rel="stylesheet" href="../assets/css/global.css"/>
</head>
<body>
<div class="layout">
  <div id="sidebar-container"></div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="main-content">
    <div id="topbar-container"></div>
    <main class="page-body">

      <div class="page-header">
        <div>
          <div class="page-title" id="prov-nombre">Cargando...</div>
          <div class="page-subtitle" id="prov-meta"></div>
        </div>
        <a href="lista.html" class="btn btn-ghost">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="14" height="14"><polyline points="15 18 9 12 15 6"/></svg>
          Volver a proveedores
        </a>
      </div>

      <div id="alert-container"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">

        <!-- Datos generales -->
        <div class="card">
          <div class="section-label">Datos del proveedor</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div>
              <div style="font-size:11px;color:var(--gray);font-weight:600;text-transform:uppercase;margin-bottom:3px">RUT</div>
              <div class="td-mono" id="prov-rut">—</div>
            </div>
            <div>
              <div style="font-size:11px;color:var(--gray);font-weight:600;text-transform:uppercase;margin-bottom:3px">Tipo</div>
              <div id="prov-tipo">—</div>
            </div>
            <div>
              <div style="font-size:11px;color:var(--gray);font-weight:600;text-transform:uppercase;margin-bottom:3px">Rubro</div>
              <div id="prov-rubro">—</div>
            </div>
            <div>
              <div style="font-size:11px;color:var(--gray);font-weight:600;text-transform:uppercase;margin-bottom:3px">País</div>
              <div id="prov-pais">—</div>
            </div>
            <div>
              <div style="font-size:11px;color:var(--gray);font-weight:600;text-transform:uppercase;margin-bottom:3px">Estado</div>
              <span class="badge" id="prov-estado-badge">—</span>
            </div>
          </div>
        </div>

        <!-- Contacto -->
        <div class="card">
          <div class="section-label">Contacto</div>
          <div style="margin-bottom:12px">
            <div style="font-size:11px;color:var(--gray);font-weight:600;text-transform:uppercase;margin-bottom:3px">Persona de contacto</div>
            <div id="prov-contacto" style="font-weight:500">—</div>
          </div>
          <div style="margin-bottom:12px">
            <div style="font-size:11px;color:var(--gray);font-weight:600;text-transform:uppercase;margin-bottom:6px">Correos</div>
            <div id="prov-correos">—</div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--gray);font-weight:600;text-transform:uppercase;margin-bottom:6px">Teléfonos</div>
            <div id="prov-telefonos">—</div>
          </div>
        </div>

      </div>

      <!-- Materiales que provee -->
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div class="section-label" style="margin-bottom:0">Materiales suministrados (FR-41)</div>
          <div style="font-size:12px;color:var(--gray)" id="materiales-count"></div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>SKU</th>
                <th>Material</th>
                <th>Tiempo reposición</th>
                <th data-rol="gerencia">Precio referencial</th>
                <th>Proveedor principal</th>
              </tr>
            </thead>
            <tbody id="tbody-materiales"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="../assets/js/layout.js"></script>
<script src="../shared/api.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const provId = params.get('id');

async function cargarDetalle() {
  if (!provId) {
    showAlert('alert-container', 'danger', 'ID de proveedor no especificado.');
    return;
  }
  try {
    const p = await API.proveedores.obtener(provId);

    document.getElementById('prov-nombre').textContent  = p.nombre || '—';
    document.getElementById('prov-meta').textContent    = `ID: ${p.id}` + (p.rut ? ` · RUT: ${p.rut}` : '');
    document.getElementById('prov-rut').textContent     = p.rut || '—';
    document.getElementById('prov-tipo').textContent    = p.tipo || '—';
    document.getElementById('prov-rubro').textContent   = p.rubro || '—';
    document.getElementById('prov-pais').textContent    = p.pais || '—';

    const estadoBadge = document.getElementById('prov-estado-badge');
    estadoBadge.textContent = p.estado || '—';
    estadoBadge.className   = `badge ${['activo','activa'].includes(p.estado) ? 'badge-success' : 'badge-gray'}`;

    const contactoNombre = [p.contacto_nombre, p.contacto_apellido].filter(Boolean).join(' ');
    document.getElementById('prov-contacto').textContent = contactoNombre || '—';

    document.getElementById('prov-correos').innerHTML = p.correos?.length
      ? p.correos.map(c => `<a href="mailto:${c}" style="color:var(--orange);font-size:13px;display:block">${c}</a>`).join('')
      : '<span style="color:var(--gray);font-size:13px">Sin correos registrados</span>';

    document.getElementById('prov-telefonos').innerHTML = p.telefonos?.length
      ? p.telefonos.map(t => `<span style="font-size:13px;display:block">${t}</span>`).join('')
      : '<span style="color:var(--gray);font-size:13px">Sin teléfonos registrados</span>';

    // Materiales
    const materiales = p.materiales || [];
    document.getElementById('materiales-count').textContent =
      `${materiales.length} material(es) asociado(s)`;

    const esGerencia = getCurrentUser()?.rol === 'gerencia';

    const tbody = document.getElementById('tbody-materiales');
    tbody.innerHTML = materiales.length === 0
      ? `<tr><td colspan="5"><div class="empty-state"><div class="empty-state-icon">📦</div><p>Este proveedor no tiene materiales asociados.</p></div></td></tr>`
      : materiales.map(m => `
        <tr>
          <td><span class="td-mono">${m.sku}</span></td>
          <td style="font-weight:500;font-size:13px">
            <a href="../productos/detalle.html?sku=${m.sku}" style="color:inherit;text-decoration:none">
              ${m.nombre}
            </a>
          </td>
          <td>
            ${m.tiempo_reposicion != null
              ? `<span style="font-weight:600">${Math.round(m.tiempo_reposicion)}</span> <span style="font-size:11px;color:var(--gray)">días</span>`
              : '<span style="color:var(--gray)">—</span>'}
          </td>
          <td data-rol="gerencia">
            ${m.precio_referencial != null
              ? `<span style="font-weight:500">$${parseFloat(m.precio_referencial).toLocaleString('es-CL')}</span>`
              : '<span style="color:var(--gray)">—</span>'}
          </td>
          <td>
            ${m.es_principal
              ? '<span class="badge badge-orange">Principal</span>'
              : '<span class="badge badge-gray">Secundario</span>'}
          </td>
        </tr>`).join('');

  } catch (err) {
    showAlert('alert-container', 'danger', 'Error cargando proveedor: ' + err.message);
    document.getElementById('prov-nombre').textContent = 'Error cargando proveedor';
  }
}

cargarDetalle();
</script>
</body>
</html>
