<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar Producto — Puertas Blindadas</title>
  <link rel="stylesheet" href="../assets/css/global.css" />
</head>
<body>
<div class="layout">
  <div id="sidebar-container"></div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="main-content">
    <div id="topbar-container"></div>
    <main class="page-body">

      <div class="page-header">
        <div>
          <div class="page-title">Editar Producto</div>
          <div class="page-subtitle" id="edit-subtitle"></div>
        </div>
        <a href="lista.html" class="btn btn-secondary">← Volver al catálogo</a>
      </div>

      <div id="alert-container"></div>

      <form id="form-editar" novalidate>
        <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;align-items:start">

          <div style="display:flex;flex-direction:column;gap:16px">

            <div class="card">
              <div class="section-label">Identificación</div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">SKU <span class="hint">(no editable)</span></label>
                  <input class="form-control" id="sku" disabled />
                </div>
                <div class="form-group">
                  <label class="form-label" for="unidad">Unidad de medida <span class="required">*</span></label>
                  <select class="form-control" id="unidad" required>
                    <option value="">Seleccionar...</option>
                    <option>unidad</option><option>kg</option><option>m²</option>
                    <option>m³</option><option>litro</option><option>metro</option>
                    <option>caja</option><option>rollo</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="nombre">Nombre <span class="required">*</span></label>
                <input class="form-control" id="nombre" maxlength="100" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="descripcion">Descripción <span class="hint">(máx. 500)</span></label>
                <textarea class="form-control" id="descripcion" rows="3" maxlength="500"></textarea>
                <div class="form-counter"><span id="desc-count">0</span>/500</div>
              </div>
            </div>

            <div class="card">
              <div class="section-label">Clasificación</div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="categoria">Categoría general <span class="required">*</span></label>
                  <select class="form-control" id="categoria" required>
                    <option value="">Cargando...</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label" for="funcional">Categoría funcional <span class="required">*</span></label>
                  <select class="form-control" id="funcional" required>
                    <option value="">Cargando...</option>
                  </select>
                </div>
              </div>
              <label class="form-check">
                <input type="checkbox" id="critico" />
                Marcar como <strong>producto crítico</strong>
              </label>
            </div>

            <!-- Clasificación específica en cascada -->
            <div class="card">
              <div class="section-label">Clasificación específica</div>
              <div class="form-group">
                <label class="form-label" for="clas-categoria">Categoría de clasificación</label>
                <select class="form-control" id="clas-categoria">
                  <option value="">Cargando...</option>
                </select>
              </div>
              <div class="form-group" id="grupo-subcategoria" style="display:none">
                <label class="form-label" for="clas-subcategoria">Subcategoría</label>
                <select class="form-control" id="clas-subcategoria">
                  <option value="">Seleccionar subcategoría...</option>
                </select>
                <div class="form-hint" id="hint-color-custom" style="display:none;color:var(--orange)">
                  Esta subcategoría admite colores personalizados
                </div>
              </div>
              <div class="form-group" id="grupo-nivel" style="display:none">
                <label class="form-label" for="clas-nivel">Nivel específico</label>
                <select class="form-control" id="clas-nivel">
                  <option value="">Seleccionar nivel...</option>
                </select>
              </div>
            </div>

          </div>

          <div style="display:flex;flex-direction:column;gap:16px">
            <div class="card">
              <div class="section-label">Parámetros de stock</div>
              <div class="form-group">
                <label class="form-label" for="stockMin">Stock mínimo <span class="required">*</span></label>
                <input class="form-control" id="stockMin" oninput="this.style.borderColor='';this.style.boxShadow=''" type="number" min="1" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="stockMax">Stock máximo <span class="required">*</span></label>
                <input class="form-control" id="stockMax" oninput="this.style.borderColor='';this.style.boxShadow=''" type="number" min="1" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="stockCritico">Stock crítico <span class="required">*</span></label>
                <input class="form-control" id="stockCritico" oninput="this.style.borderColor='';this.style.boxShadow=''" type="number" min="0" required />
                <div class="form-hint">Debe ser ≤ stock mínimo</div>
              </div>
              <div class="divider"></div>
              <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Guardar cambios</button>
              <a href="lista.html" class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:8px">Cancelar</a>
            </div>

            <!-- Estado del producto -->
            <div class="card">
              <div class="section-label">Estado del producto</div>
              <div class="form-group">
                <label class="form-label" for="estado">Estado</label>
                <select class="form-control" id="estado">
                  <option value="activo">Activo</option>
                  <option value="inactivo">Inactivo</option>
                </select>
                <div class="form-hint">Inactivo oculta el producto del catálogo sin eliminarlo</div>
              </div>
            </div>
          </div>

        </div>
      </form>

    </main>
  </div>
</div>

<script src="../assets/js/layout.js"></script>
<script src="../shared/api.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const sku    = params.get('sku');

  let _clasificacion = { categorias: [], subcategorias: [], niveles: [] };

  async function cargarCatalogosYProducto() {
    if (!sku) {
      showAlert('alert-container', 'danger', 'No se especificó un SKU para editar.');
      return;
    }
    try {
      // Cargar catálogos y producto por separado para identificar el error exacto
      const [unidades, categorias] = await Promise.all([
        API.materiales.unidades(),
        API.materiales.categorias(),
      ]);
      let prod = null;
      try {
        prod = await API.materiales.obtener(sku);
      } catch (e) {
        showAlert('alert-container', 'danger', `Error cargando producto SKU ${sku}: ${e.message}`);
        return;
      }
      const [unidades_ok, categorias_ok] = [unidades, categorias];

      document.getElementById('unidad').innerHTML = '<option value="">Seleccionar...</option>' +
        unidades_ok.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');
      document.getElementById('categoria').innerHTML = '<option value="">Seleccionar...</option>' +
        categorias_ok.generales.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
      document.getElementById('funcional').innerHTML = '<option value="">Seleccionar...</option>' +
        categorias_ok.funcionales.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');

      _clasificacion = categorias_ok.clasificacion || { categorias: [], subcategorias: [], niveles: [] };
      document.getElementById('clas-categoria').innerHTML = '<option value="">Seleccionar categoría...</option>' +
        _clasificacion.categorias.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');

      if (prod) {
        document.getElementById('edit-subtitle').textContent = `SKU: ${prod.sku}`;
        document.getElementById('sku').value          = prod.sku;
        document.getElementById('nombre').value       = prod.nombre || '';
        document.getElementById('descripcion').value  = prod.descripcion || '';
        document.getElementById('desc-count').textContent = (prod.descripcion || '').length;
        // Usar != null para no perder el valor 0
        document.getElementById('stockMin').value     = prod.stock_minimo != null ? prod.stock_minimo : '';
        document.getElementById('stockMax').value     = prod.stock_maximo != null ? prod.stock_maximo : '';
        document.getElementById('stockCritico').value = prod.stock_critico != null ? prod.stock_critico : '';
        document.getElementById('critico').checked    = prod.es_critico || false;
        console.log('Producto cargado:', prod);

        // Pre-seleccionar por ID (más fiable que por nombre)
        if (prod.unidad_medida_id)      document.getElementById('unidad').value    = String(prod.unidad_medida_id);
        if (prod.categoria_general_id)  document.getElementById('categoria').value = String(prod.categoria_general_id);
        if (prod.categoria_funcional_id)document.getElementById('funcional').value = String(prod.categoria_funcional_id);

        // Pre-seleccionar clasificación en cascada si el producto tiene nivel
        if (prod.clasificacion_nivel) {
          const nivel = _clasificacion.niveles.find(n => n.nombre === prod.clasificacion_nivel);
          if (nivel) {
            const sub = _clasificacion.subcategorias.find(s => s.id === nivel.subcategoria_id);
            if (sub) {
              // Seleccionar categoría
              Array.from(document.getElementById('clas-categoria').options).forEach(o => {
                if (String(o.value) === String(sub.categoria_id)) { o.selected = true; }
              });
              // Poblar y seleccionar subcategoría
              const subs = _clasificacion.subcategorias.filter(s => String(s.categoria_id) === String(sub.categoria_id));
              document.getElementById('clas-subcategoria').innerHTML = '<option value="">Seleccionar subcategoría...</option>' +
                subs.map(s => `<option value="${s.id}" data-color="${s.es_color_custom}">${s.nombre}</option>`).join('');
              document.getElementById('grupo-subcategoria').style.display = 'block';
              Array.from(document.getElementById('clas-subcategoria').options).forEach(o => {
                if (String(o.value) === String(sub.id)) { o.selected = true; }
              });
              // Poblar y seleccionar nivel
              const niveles = _clasificacion.niveles.filter(n => String(n.subcategoria_id) === String(sub.id));
              document.getElementById('clas-nivel').innerHTML = '<option value="">Seleccionar nivel...</option>' +
                niveles.map(n => `<option value="${n.id}">${n.nombre}</option>`).join('');
              document.getElementById('grupo-nivel').style.display = 'block';
              Array.from(document.getElementById('clas-nivel').options).forEach(o => {
                if (String(o.value) === String(nivel.id)) { o.selected = true; }
              });
            }
          }
        }
      } else if (sku) {
        showAlert('alert-container', 'danger', 'Producto no encontrado.');
      }
    } catch (err) {
      showAlert('alert-container', 'danger', 'Error cargando datos: ' + err.message);
    }
  }

  // Cascada categoría → subcategoría
  document.getElementById('clas-categoria')?.addEventListener('change', function() {
    const catId = this.value;
    const grupoSub = document.getElementById('grupo-subcategoria');
    document.getElementById('grupo-nivel').style.display = 'none';
    if (!catId) { grupoSub.style.display = 'none'; return; }
    const subs = _clasificacion.subcategorias.filter(s => String(s.categoria_id) === String(catId));
    document.getElementById('clas-subcategoria').innerHTML = '<option value="">Seleccionar subcategoría...</option>' +
      subs.map(s => `<option value="${s.id}" data-color="${s.es_color_custom}">${s.nombre}</option>`).join('');
    grupoSub.style.display = 'block';
  });

  // Cascada subcategoría → nivel
  document.getElementById('clas-subcategoria')?.addEventListener('change', function() {
    const subId = this.value;
    const grupoNiv = document.getElementById('grupo-nivel');
    const esColor  = this.options[this.selectedIndex]?.dataset?.color === 'true';
    document.getElementById('hint-color-custom').style.display = esColor ? 'block' : 'none';
    if (!subId) { grupoNiv.style.display = 'none'; return; }
    const niveles = _clasificacion.niveles.filter(n => String(n.subcategoria_id) === String(subId));
    document.getElementById('clas-nivel').innerHTML = '<option value="">Seleccionar nivel...</option>' +
      niveles.map(n => `<option value="${n.id}">${n.nombre}</option>`).join('');
    grupoNiv.style.display = 'block';
  });

  document.getElementById('descripcion').addEventListener('input', function() {
    document.getElementById('desc-count').textContent = this.value.length;
  });

  document.getElementById('form-editar').addEventListener('submit', async function(e) {
    e.preventDefault();

    // Leer todos los valores
    const nombre    = document.getElementById('nombre').value.trim();
    const categoria = document.getElementById('categoria').value;
    const funcional = document.getElementById('funcional').value;
    const unidad    = document.getElementById('unidad').value;
    const minVal    = document.getElementById('stockMin').value;
    const maxVal    = document.getElementById('stockMax').value;
    const critVal   = document.getElementById('stockCritico').value;
    const esCritico = document.getElementById('critico').checked;
    const clasNivel = document.getElementById('clas-nivel').value;

    // Limpiar bordes previos
    ['nombre','unidad','categoria','funcional','stockMin','stockMax','stockCritico'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.style.borderColor = ''; el.style.boxShadow = ''; }
    });

    // Validar campos obligatorios con borde rojo
    let error = null;
    if (!nombre || nombre.length < 3) {
      document.getElementById('nombre').style.borderColor = 'var(--danger)';
      error = 'El nombre debe tener al menos 3 caracteres.';
    } else if (nombre.length > 100) {
      document.getElementById('nombre').style.borderColor = 'var(--danger)';
      error = 'El nombre no puede superar los 100 caracteres.';
    } else if (!unidad) {
      document.getElementById('unidad').style.borderColor = 'var(--danger)';
      error = 'Selecciona la unidad de medida.';
    } else if (!categoria) {
      document.getElementById('categoria').style.borderColor = 'var(--danger)';
      error = 'Selecciona la categoría general.';
    } else if (!funcional) {
      document.getElementById('funcional').style.borderColor = 'var(--danger)';
      error = 'Selecciona la categoría funcional.';
    }

    // Validar stocks solo si tienen valor
    const min  = minVal  !== '' ? parseFloat(minVal)  : null;
    const max  = maxVal  !== '' ? parseFloat(maxVal)  : null;
    const crit = critVal !== '' ? parseFloat(critVal) : null;

    if (!error && min !== null && (isNaN(min) || min < 0)) {
      document.getElementById('stockMin').style.borderColor = 'var(--danger)';
      document.getElementById('stockMin').style.boxShadow   = '0 0 0 3px rgba(220,53,69,.12)';
      error = 'Stock mínimo debe ser mayor o igual a 0.';
    } else if (!error && max !== null && min !== null && max <= min) {
      document.getElementById('stockMax').style.borderColor = 'var(--danger)';
      document.getElementById('stockMax').style.boxShadow   = '0 0 0 3px rgba(220,53,69,.12)';
      error = 'Stock máximo debe ser mayor que el stock mínimo.';
    } else if (!error && crit !== null && min !== null && crit > min) {
      document.getElementById('stockCritico').style.borderColor = 'var(--danger)';
      document.getElementById('stockCritico').style.boxShadow   = '0 0 0 3px rgba(220,53,69,.12)';
      error = 'Stock crítico debe estar entre 0 y el stock mínimo.';
    }

    if (error) { showAlert('alert-container','danger', error); return; }

    const btn = e.submitter || document.querySelector('[type=submit]');
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
      const payload = {
        nombre,
        descripcion:           document.getElementById('descripcion').value.trim() || null,
        es_critico:            esCritico,
        unidad_medida_id:      parseInt(unidad),
        categoria_general_id:  parseInt(categoria),
        categoria_funcional_id: parseInt(funcional),
      };
      // Solo incluir stocks si tienen valor
      if (min  !== null) payload.stock_minimo  = min;
      if (max  !== null) payload.stock_maximo  = max;
      if (crit !== null) payload.stock_critico = crit;
      if (clasNivel)     payload.clasificacion_nivel_especifico_id = parseInt(clasNivel);

      console.log('Enviando PUT:', sku, payload);
      await API.materiales.actualizar(sku, payload);
      showAlert('alert-container','success','Producto actualizado correctamente.');
      setTimeout(() => { window.location.href = 'lista.html'; }, 1200);
    } catch (err) {
      console.error('Error al actualizar:', err);
      showAlert('alert-container','danger', err.message || 'Error al actualizar el producto.');
      btn.disabled = false;
      btn.textContent = 'Guardar cambios';
    }
  });

  cargarCatalogosYProducto();
</script>
</body>
</html>
